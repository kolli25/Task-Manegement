<nz-layout style="min-height:100vh; background:#f0f2f5;">

    <!-- Header -->
    <div style="background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
                padding: 0 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 64px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
      <div style="display:flex; align-items:center; gap:12px;">
        <span nz-icon nzType="project" nzTheme="fill"
              style="font-size:28px; color:white;"></span>
        <span style="color:white; font-size:20px;
                     font-weight:700; letter-spacing:0.5px;">
          Task Management System
        </span>
      </div>
    </div>
  
    <nz-content style="padding:32px;">
  
      <!-- Breadcrumb -->
      <nz-breadcrumb style="margin-bottom:16px;">
        <nz-breadcrumb-item>
          <span nz-icon nzType="home"></span>
          <a (click)="cancel()" style="cursor:pointer;">Home</a>
        </nz-breadcrumb-item>
        <nz-breadcrumb-item>Tasks</nz-breadcrumb-item>
        <nz-breadcrumb-item>{{ pageTitle }}</nz-breadcrumb-item>
      </nz-breadcrumb>
  
      <!-- Form Card -->
      <nz-card style="max-width:750px; margin:0 auto;
                      border-radius:16px;
                      box-shadow:0 4px 24px rgba(0,0,0,0.10);">
  
        <!-- Card Header -->
        <div style="display:flex; align-items:center;
                    gap:12px; margin-bottom:24px;
                    padding-bottom:16px;
                    border-bottom:2px solid #f0f0f0;">
          <div style="width:44px; height:44px; border-radius:12px;
                      background:linear-gradient(135deg,#1890ff,#096dd9);
                      display:flex; align-items:center;
                      justify-content:center;">
            <span nz-icon [nzType]="pageIcon"
                  style="font-size:22px; color:white;"></span>
          </div>
          <div>
            <h2 style="margin:0; font-size:18px; font-weight:700;">
              {{ pageTitle }}
            </h2>
            <p style="margin:0; color:#8c8c8c; font-size:13px;">
              {{ isViewMode ? 'Viewing task details' : isEditMode ?
                 'Update task information' : 'Fill in the details below' }}
            </p>
          </div>
  
          <!-- View Mode Badge -->
          <div *ngIf="isViewMode" style="margin-left:auto;">
            <nz-tag nzColor="blue"
                    style="border-radius:12px; padding:4px 12px;
                           font-size:12px; font-weight:600;">
              <span nz-icon nzType="eye"></span>
              View Only
            </nz-tag>
          </div>
        </div>
  
        <!-- Form -->
        <form nz-form [formGroup]="taskForm" nzLayout="vertical">
  
          <!-- Title -->
          <nz-form-item>
            <nz-form-label nzRequired style="font-weight:600; color:#262626;">
              <span nz-icon nzType="file-text" style="margin-right:6px;"></span>
              Task Title
            </nz-form-label>
            <nz-form-control nzErrorTip="Please enter a valid title (min 3 chars)">
              <input nz-input
                     formControlName="title"
                     placeholder="Enter task title..."
                     style="border-radius:8px; height:40px;" />
            </nz-form-control>
          </nz-form-item>
  
          <!-- Description -->
          <nz-form-item>
            <nz-form-label nzRequired style="font-weight:600; color:#262626;">
              <span nz-icon nzType="align-left" style="margin-right:6px;"></span>
              Description
            </nz-form-label>
            <nz-form-control nzErrorTip="Please enter a description (min 5 chars)">
              <textarea nz-input
                        formControlName="description"
                        placeholder="Describe the task in detail..."
                        [nzAutosize]="{ minRows: 3, maxRows: 6 }"
                        style="border-radius:8px;"></textarea>
            </nz-form-control>
          </nz-form-item>
  
          <!-- Date Row -->
          <div style="display:grid;
                      grid-template-columns:1fr 1fr; gap:16px;">
  
            <!-- Start Date -->
            <nz-form-item>
              <nz-form-label nzRequired style="font-weight:600; color:#262626;">
                <span nz-icon nzType="calendar" style="margin-right:6px;"></span>
                Start Date
              </nz-form-label>
              <nz-form-control nzErrorTip="Please select start date">
                <nz-date-picker
                  formControlName="startDate"
                  nzPlaceHolder="Select start date"
                  style="width:100%; border-radius:8px; height:40px;">
                </nz-date-picker>
              </nz-form-control>
            </nz-form-item>
  
            <!-- End Date -->
            <nz-form-item>
              <nz-form-label nzRequired style="font-weight:600; color:#262626;">
                <span nz-icon nzType="calendar" style="margin-right:6px;"></span>
                End Date
              </nz-form-label>
              <nz-form-control nzErrorTip="Please select end date">
                <nz-date-picker
                  formControlName="endDate"
                  nzPlaceHolder="Select end date"
                  style="width:100%; border-radius:8px; height:40px;">
                </nz-date-picker>
              </nz-form-control>
            </nz-form-item>
  
          </div>
  
          <!-- Status -->
          <nz-form-item>
            <nz-form-label nzRequired style="font-weight:600; color:#262626;">
              <span nz-icon nzType="flag" style="margin-right:6px;"></span>
              Status
            </nz-form-label>
            <nz-form-control nzErrorTip="Please select a status">
              <nz-select formControlName="status"
                         nzPlaceHolder="Select status"
                         style="width:100%; border-radius:8px;">
                <nz-option *ngFor="let s of statusOptions"
                           [nzValue]="s.value"
                           [nzLabel]="s.label">
                </nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
  
          <nz-divider></nz-divider>
  
          <!-- Buttons -->
          <!-- Buttons -->
<div style="display:flex; gap:12px; justify-content:flex-end;">

    <button nz-button nzType="default"
            [disabled]="isViewMode"
            (click)="cancel()"
            style="border-radius:8px; height:40px; padding:0 24px; font-weight:500;">
      <span nz-icon nzType="close"></span>
      Cancel
    </button>
  
    <button nz-button nzType="primary"
            [disabled]="isViewMode"
            (click)="submit()"
            style="border-radius:8px; height:40px; padding:0 24px; font-weight:500;">
      <span nz-icon nzType="check"></span>
      {{ isEditMode ? 'Update Task' : 'Submit Task' }}
    </button>
  
  </div>
